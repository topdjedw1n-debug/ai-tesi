version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-thesis-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-thesis-network

  redis:
    image: redis:7-alpine
    container_name: ai-thesis-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ai-thesis-network

  minio:
    image: minio/minio:latest
    container_name: ai-thesis-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 20s
    networks:
      - ai-thesis-network

  api:
    image: ${API_IMAGE:-ai-thesis-api}
    container_name: ai-thesis-api
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=false
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MVP_FREE_GENERATION_ENABLED=${MVP_FREE_GENERATION_ENABLED:-true}
      - MVP_FREE_GENERATION_MAX_PAGES=${MVP_FREE_GENERATION_MAX_PAGES:-20}
      - MVP_FREE_GENERATION_DAILY_USER_LIMIT=${MVP_FREE_GENERATION_DAILY_USER_LIMIT:-2}
      - DAILY_TOKEN_LIMIT=${DAILY_TOKEN_LIMIT:-2000000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ai-thesis-network

  web:
    image: ${WEB_IMAGE:-ai-thesis-web}
    container_name: ai-thesis-web
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_ENABLE_USER_PAYMENT_FLOW=${NEXT_PUBLIC_ENABLE_USER_PAYMENT_FLOW:-false}
      - NEXT_PUBLIC_ENABLE_USER_REFUND_FLOW=${NEXT_PUBLIC_ENABLE_USER_REFUND_FLOW:-false}
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ai-thesis-network

volumes:
  postgres_data:
  minio_data:
  redis_data:

networks:
  ai-thesis-network:
    name: ai-thesis-network
