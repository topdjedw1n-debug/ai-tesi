name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch: # Allows manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'ENDSSH'
            set -e

            echo "📦 Updating code from repository..."
            cd /home/$USER/ai-thesis || {
              echo "❌ Project directory not found. Run setup script first!"
              exit 1
            }

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            echo "🔧 Updating environment variables..."
            cat > .env.production << EOF
          # Database
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

          # MinIO
          MINIO_ROOT_USER=${MINIO_ROOT_USER}
          MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
          MINIO_ENDPOINT=minio:9000
          MINIO_BUCKET=ai-thesis-documents

          # Redis
          REDIS_URL=redis://redis:6379/0

          # Security
          SECRET_KEY=${SECRET_KEY}
          ADMIN_PASSWORD_HASH=\$2b\$12\$LQv3c1yqBWVHxkd0LHAkCOYz6TtxMQJqhN8/LewY5GQrs1kUOdIC6

          # AI APIs
          OPENAI_API_KEY=${OPENAI_API_KEY}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

          # Stripe
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}

          # Email
          RESEND_API_KEY=${RESEND_API_KEY}
          FROM_EMAIL=noreply@yourdomain.com

          # App
          ENVIRONMENT=production
          FRONTEND_URL=http://${EC2_HOST}:3000
          BACKEND_URL=http://${EC2_HOST}:8000
          EOF

            echo "🐳 Stopping old containers..."
            cd infra/docker
            docker-compose -f docker-compose.prod.yml down || true

            echo "🚀 Starting new containers..."
            docker-compose -f docker-compose.prod.yml --env-file ../../.env.production up -d --build

            echo "⏳ Waiting for services to be healthy..."
            sleep 10

            echo "🗄️ Running database migrations..."
            docker-compose -f docker-compose.prod.yml exec -T api alembic upgrade head

            echo "✅ Deployment completed successfully!"
            docker-compose -f docker-compose.prod.yml ps
          ENDSSH

      - name: Health check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 5
          curl -f http://$EC2_HOST:8000/health || echo "⚠️ Backend health check failed"
          curl -f http://$EC2_HOST:3000 || echo "⚠️ Frontend health check failed"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Check logs above."
