name: CI Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  repo-hygiene:
    name: repo-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail on backup artifacts
        run: |
          set -euo pipefail

          PATTERN='(^|/)\.env\.backup|(^|/)\.env\.bak$|\.bak$|\.backup$|\.backup[0-9]+$'

          tracked_hits=$(git ls-files | grep -E "$PATTERN" || true)
          untracked_hits=$(git ls-files --others --exclude-standard | grep -E "$PATTERN" || true)

          if [ -n "$tracked_hits" ] || [ -n "$untracked_hits" ]; then
            echo "❌ Forbidden backup artifacts detected"
            if [ -n "$tracked_hits" ]; then
              echo "Tracked files:"
              echo "$tracked_hits"
            fi
            if [ -n "$untracked_hits" ]; then
              echo "Untracked files:"
              echo "$untracked_hits"
            fi
            exit 1
          fi

          echo "✅ Repo hygiene passed"

  python-version-gate:
    name: python-version-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check Python version
        run: |
          python --version
          python -c "import sys; assert sys.version_info >= (3, 11), f'Python 3.11+ required, got {sys.version}'"

  backend-ruff:
    name: backend-ruff
    runs-on: ubuntu-latest
    needs: [python-version-gate]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        # Pinned to the version used locally (venv + pre-commit); an unpinned
        # install drifted ahead and flagged rules (UP042) the local toolchain
        # doesn't enforce yet. Bump deliberately together with local tooling.
        run: pip install ruff==0.14.7

      - name: Run Ruff
        run: |
          cd apps/api
          ruff check . --output-format=github

  backend-mypy:
    name: backend-mypy
    runs-on: ubuntu-latest
    needs: [python-version-gate]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd apps/api
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy

      - name: Run MyPy
        run: |
          cd apps/api
          mypy app/ --config-file mypy.ini --show-error-codes --show-error-context

  backend-pytest:
    name: backend-pytest
    runs-on: ubuntu-latest
    needs: [python-version-gate]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd apps/api
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          cd apps/api
          pytest tests/ -q

  web-lint:
    name: web-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci

      - name: Run lint
        run: |
          cd apps/web
          npm run lint

  web-typecheck:
    name: web-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci

      - name: Run type-check
        run: |
          cd apps/web
          npm run type-check

  web-jest:
    name: web-jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci

      - name: Clean Next.js build artifacts before Jest
        run: |
          cd apps/web
          rm -rf .next

      - name: Run Jest
        run: |
          cd apps/web
          npm run test -- --runInBand

  web-build:
    name: web-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci

      - name: Build web app
        run: |
          cd apps/web
          npm run build

  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    needs:
      - repo-hygiene
      - backend-pytest
      - web-lint
      - web-typecheck
      - web-jest
      - web-build
    if: ${{ always() }}
    steps:
      - name: Enforce mandatory gate
        run: |
          if [ "${{ needs.repo-hygiene.result }}" != "success" ] || \
             [ "${{ needs.backend-pytest.result }}" != "success" ] || \
             [ "${{ needs.web-lint.result }}" != "success" ] || \
             [ "${{ needs.web-typecheck.result }}" != "success" ] || \
             [ "${{ needs.web-jest.result }}" != "success" ] || \
             [ "${{ needs.web-build.result }}" != "success" ]; then
            echo "❌ Mandatory quality gates failed"
            exit 1
          fi

          echo "✅ All mandatory quality gates passed"
