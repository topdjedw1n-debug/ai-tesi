# Gold set for CitationVerifier (run via: python -m evals.run_citation_eval).
# Expected labels use the document-status vocabulary of map_verification_status:
#   verified   - source resolves and the title matches (score >= 0.90)
#   mismatched - identifier (DOI/arXiv) resolves but the cited title is a
#                different paper (only reachable via identifier hits, so every
#                mismatched case MUST carry a Crossref-registered DOI or an
#                arXiv id, plus canonical_title for the CI similarity guard)
#   not_found  - the source does not exist in any bibliographic database
# All entries hand-curated from public bibliographic metadata.
version: 1
cases:
  # ------------------------------------------------------------------
  # verified: DOI hits (Crossref-registered DOIs, correct titles)
  # ------------------------------------------------------------------
  - id: cit-ver-001
    expected: verified
    group: doi_hit
    note: ResNet paper, IEEE/CVPR DOI registered in Crossref
    source:
      title: "Deep Residual Learning for Image Recognition"
      authors: ["Kaiming He", "Xiangyu Zhang", "Shaoqing Ren", "Jian Sun"]
      year: 2016
      doi: "10.1109/CVPR.2016.90"
