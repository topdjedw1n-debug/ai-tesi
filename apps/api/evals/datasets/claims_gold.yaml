  - id: clm-sup-003
    expected: supported
    source_key: soil
    source_title: "Nitrogen Fertilization and Soil Acidification in Long-Term Field Trials"
    citation_text: "[Lindqvist, 2019]"
    sentence: "Long-term nitrogen fertilization lowers topsoil pH in agricultural field trials [Lindqvist, 2019]."
    abstract: >-
      Analyzing 40 years of data from twelve agricultural field trials, we find that
      sustained nitrogen fertilization progressively acidifies the topsoil, with mean
      pH declining by 0.8 units. Liming only partially offsets the effect, and
      acidification accelerates under higher application rates.
  - id: clm-sup-004
    expected: supported
    source_key: soil
    source_title: "Nitrogen Fertilization and Soil Acidification in Long-Term Field Trials"
    citation_text: "[Lindqvist, 2019]"
    sentence: "Liming compensates for fertilization-driven acidification only partially [Lindqvist, 2019]."
    abstract: >-
