# Gold set for ClaimVerifier's LLM judgment (run via: python -m evals.run_claim_eval).
# Each case pairs a cited sentence with the abstract of the source it cites and
# the expected verdict: supported | unsupported | uncertain.
#
# Abstracts are ORIGINAL SYNTHETIC texts written for this dataset (not copied
# from real papers): full ground-truth control and no licensing concerns.
# Cases sharing a source_key share one synthetic source_id in the runner, so a
# batch contains repeated sources and exercises prompt abstract deduplication.
version: 1
cases:
  # ------------------------------------------------------------------
  # supported: direct paraphrases and reasonable entailments
  # ------------------------------------------------------------------
  - id: clm-sup-001
    expected: supported
    source_key: attn
    source_title: "Attention-Only Sequence Transduction"
    citation_text: "[Verhoeven, 2017]"
    sentence: "Attention-only architectures can replace recurrent components entirely in sequence transduction models [Verhoeven, 2017]."
    abstract: >-
      We introduce a sequence transduction architecture that relies exclusively on
      attention mechanisms, removing recurrent and convolutional components entirely.
      On two machine translation benchmarks the model improves output quality while
      requiring substantially less training time than recurrent baselines.
  - id: clm-sup-002
    expected: supported
    source_key: attn
