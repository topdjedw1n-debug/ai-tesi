  - id: clm-sup-010
    expected: supported
    source_key: urban
    source_title: "Street Trees and Summer Surface Temperatures in European Cities"
    citation_text: "[Castellani, 2022]"
    sentence: "Dense street tree canopies lower summer surface temperatures in European cities [Castellani, 2022]."
    abstract: >-
      Using thermal imagery from 47 European cities, we estimate that streets with
      canopy cover above 30 percent are on average 3.1 degrees Celsius cooler at the
      surface during summer heat events than comparable streets without trees. The
      cooling effect grows with canopy density and is strongest in compact urban cores.

