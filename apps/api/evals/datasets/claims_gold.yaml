  - id: clm-sup-005
    expected: supported
    source_key: sleep
    source_title: "Sleep Restriction and Working Memory in Adolescents"
    citation_text: "[Okafor, 2021]"
    sentence: "Restricting adolescents' sleep to six hours impairs their working memory performance [Okafor, 2021]."
    abstract: >-
      In a randomized crossover study with 84 adolescents, restricting sleep to six
      hours per night for one week reduced working memory accuracy by 12 percent and
      slowed reaction times, relative to a nine-hour control condition. Effects
      persisted after two recovery nights.
  - id: clm-sup-006
    expected: supported
    source_key: sleep
    source_title: "Sleep Restriction and Working Memory in Adolescents"
    citation_text: "[Okafor, 2021]"
    sentence: "Cognitive deficits from a week of short sleep persist even after two nights of recovery sleep [Okafor, 2021]."
    abstract: >-
      In a randomized crossover study with 84 adolescents, restricting sleep to six
      hours per night for one week reduced working memory accuracy by 12 percent and
      slowed reaction times, relative to a nine-hour control condition. Effects
      persisted after two recovery nights.
  - id: clm-sup-007
    expected: supported
    source_key: coral
    source_title: "Thermal Stress Thresholds for Reef-Building Corals"
    citation_text: "[Maranhão, 2020]"
    sentence: "Coral bleaching risk rises sharply once water temperatures exceed local summer maxima by one degree Celsius [Maranhão, 2020]."
    abstract: >-
      Combining satellite temperature records with reef surveys across 60 sites, we
      show that bleaching probability increases sharply when sea surface temperature
      exceeds the local summer maximum by one degree Celsius for four or more weeks.
      Recovery rates depend strongly on the duration of exposure.
  - id: clm-sup-008
    expected: supported
    source_key: vacc
    source_title: "Text-Message Reminders and Vaccination Uptake: A Field Experiment"
    citation_text: "[Bergström, 2018]"
    sentence: "Simple SMS reminders measurably increase vaccination uptake [Bergström, 2018]."
    abstract: >-
      In a field experiment covering 31,000 patients, automated text-message
      reminders increased influenza vaccination uptake by 4.6 percentage points.
      Effects were largest among patients without a recent vaccination history,
      and message wording mattered less than timing.
  - id: clm-sup-009
    expected: supported
    source_key: vacc
    source_title: "Text-Message Reminders and Vaccination Uptake: A Field Experiment"
    citation_text: "[Bergström, 2018]"
    sentence: "Reminder timing influenced vaccination uptake more than the exact wording of the message [Bergström, 2018]."
    abstract: >-
      In a field experiment covering 31,000 patients, automated text-message
      reminders increased influenza vaccination uptake by 4.6 percentage points.
